<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED Aim Trainer - Diversified</title>
    <style>
        :root { --primary: #ff4655; --bg: #0f1923; --accent: #00ff00; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 25, 35, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; }
        .input-box { background: #1f2326; border: 1px solid #333; padding: 20px; margin: 20px; border-top: 3px solid var(--primary); }
        input { background: #0f1923; border: 1px solid var(--primary); color: white; padding: 10px; font-size: 18px; width: 100px; text-align: center; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; pointer-events: none; z-index: 10; display: none; }
        .ch-line { position: absolute; background: var(--accent); }
        .v { width: 2px; height: 6px; left: 8px; } .h { width: 6px; height: 2px; top: 8px; }
        #quiz-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1f2326; padding: 40px; border: 1px solid var(--primary); z-index: 100; width: 480px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #2a2e33; color: white; border: 1px solid #3d434a; cursor: pointer; text-align: left; }
        .option-btn:hover { background: var(--primary); }
        .hud { position: absolute; top: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #progress-bar { width: 300px; height: 5px; background: rgba(255,255,255,0.1); }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color:var(--primary); letter-spacing: 8px;">DIVERSIFIED TRAINING</h1>
    <div class="input-box">
        <p style="font-size: 12px; color: #888;">VALORANT SENSITIVITY</p>
        <input type="number" id="valSensInput" value="0.50" step="0.01">
    </div>
    <button class="btn-main" onclick="resumeGame()">START</button>
</div>

<div class="hud">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status-text" style="font-size: 10px; margin-top:5px; color:#555">WAITING FOR TARGET...</div>
</div>

<div id="crosshair">
    <div class="ch-line v" style="top:0"></div><div class="ch-line v" style="bottom:0"></div>
    <div class="ch-line h" style="left:0"></div><div class="ch-line h" style="right:0"></div>
</div>

<div id="quiz-overlay">
    <h4 id="q-subject" style="color: var(--primary); margin: 0; letter-spacing: 2px; font-size: 12px;"></h4>
    <h2 id="q-text" style="font-weight: normal; margin: 15px 0 25px 0; font-size: 18px;"></h2>
    <div id="q-options"></div>
</div>

<canvas id="game-canvas"></canvas>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const progressFill = document.getElementById('progress-fill');
    const quizOverlay = document.getElementById('quiz-overlay');
    const startScreen = document.getElementById('start-screen');
    const crosshair = document.getElementById('crosshair');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false;
    let trackingScore = 0;
    let viewX = 0, viewY = 0;
    let lastQType = ""; // History tracking
    
    let target = { x: canvas.width/2, y: canvas.height/2, r: 32, dx: 1.1, dy: 0.8 };

    // --- INFINITE DIVERSIFIED GENERATOR ---
    function generateQuestion() {
        const types = [
            'pythagorean', 'probability', 'slop-intercept', 'biology-cell', 
            'chem-elements', 'physics-force', 'logic-sequence', 'vocab-context'
        ];
        
        // Ensure we don't get the same category twice in a row
        let type;
        do { type = types[Math.floor(Math.random() * types.length)]; } while (type === lastQType);
        lastQType = type;

        switch(type) {
            case 'pythagorean':
                const a = 3 * (Math.floor(Math.random()*3)+1);
                const b = 4 * (Math.floor(Math.random()*3)+1);
                const c = Math.sqrt(a*a + b*b);
                return { subject: "GEOMETRY", q: `In a right triangle, if side A=${a} and side B=${b}, what is the hypotenuse?`, options: shuffle([c, c+2, a+b, 25]), answer: c.toString() };
            
            case 'probability':
                const dice = Math.floor(Math.random()*5)+1;
                return { subject: "PROBABILITY", q: `What is the probability of rolling a number greater than ${dice} on a standard 6-sided die?`, options: [`${6-dice}/6`, `${dice}/6`, "1/2", "1/6"], answer: `${6-dice}/6` };

            case 'slop-intercept':
                const m = Math.floor(Math.random()*5)+1;
                return { subject: "ALGEBRA", q: `In the equation y = ${m}x + 2, what is the slope?`, options: [m.toString(), "2", "x", "y"], answer: m.toString() };

            case 'biology-cell':
                const cells = [
                    {n:"Mitochondria", f:"Energy (ATP) production"},
                    {n:"Ribosomes", f:"Protein synthesis"},
                    {n:"Cell Membrane", f:"Regulating entry/exit"},
                    {n:"Chloroplast", f:"Photosynthesis"}
                ];
                const pick = cells[Math.floor(Math.random()*cells.length)];
                return { subject: "BIOLOGY", q: `What is the primary function of the ${pick.n}?`, options: shuffle([pick.f, "DNA Storage", "Waste Management", "Structural Support"]), answer: pick.f };

            case 'physics-force':
                const mass = Math.floor(Math.random()*10)+2;
                const acc = Math.floor(Math.random()*5)+2;
                return { subject: "PHYSICS", q: `Force = Mass × Acceleration. How much force (N) is needed to move a ${mass}kg object at ${acc}m/s²?`, options: [mass*acc, mass+acc, mass/acc, "9.8"], answer: (mass*acc).toString() };

            case 'logic-sequence':
                const start = Math.floor(Math.random()*10);
                const step = Math.floor(Math.random()*5)+2;
                const seq = [start, start+step, start+(step*2)];
                return { subject: "LOGIC", q: `What is the next number in the sequence: ${seq.join(", ")}, ...?`, options: [start+(step*3), start+(step*4), seq[2]+1, "0"], answer: (start+(step*3)).toString() };
            
            default:
                return { subject: "GED GENERIC", q: "Which of these is a physical change rather than a chemical change?", options: ["Ice melting", "Wood burning", "Iron rusting", "Egg cooking"], answer: "Ice melting" };
        }
    }

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function resumeGame() {
        startScreen.style.display = 'none';
        quizOverlay.style.display = 'none';
        canvas.requestPointerLock();
    }

    document.addEventListener('pointerlockchange', () => {
        gameActive = (document.pointerLockElement === canvas);
        crosshair.style.display = gameActive ? 'block' : 'none';
        if (!gameActive && quizOverlay.style.display !== 'block') startScreen.style.display = 'flex';
    });

    document.addEventListener('mousemove', (e) => {
        if (!gameActive) return;
        const sens = parseFloat(document.getElementById('valSensInput').value) || 0.5;
        viewX -= e.movementX * (sens * 1.4);
        viewY -= e.movementY * (sens * 1.4);
    });

    function showQuiz() {
        gameActive = false;
        quizOverlay.style.display = 'block';
        const q = generateQuestion();
        document.getElementById('q-subject').innerText = q.subject;
        document.getElementById('q-text').innerText = q.q;
        const container = document.getElementById('q-options');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                trackingScore = 0;
                resumeGame();
            };
            container.appendChild(b);
        });
    }

    function update() {
        if (gameActive) {
            target.x += target.dx; target.y += target.dy;
            if (target.x + target.r > canvas.width || target.x - target.r < 0) target.dx *= -1;
            if (target.y + target.r > canvas.height || target.y - target.r < 0) target.dy *= -1;
            let vX = (( (target.x + viewX) % canvas.width) + canvas.width) % canvas.width;
            let vY = (( (target.y + viewY) % canvas.height) + canvas.height) % canvas.height;
            const dist = Math.hypot(vX - canvas.width/2, vY - canvas.height/2);
            if (dist < target.r) trackingScore += 1.3;
            else if (trackingScore > 0) trackingScore -= 0.4;
            progressFill.style.width = (trackingScore / 2) + "%";
            if (trackingScore >= 200) { document.exitPointerLock(); showQuiz(); }
            draw(vX, vY);
        }
        requestAnimationFrame(update);
    }

    function draw(vX, vY) {
        ctx.fillStyle = '#0f1923'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a252e';
        for(let i=0; i<canvas.width; i+=200) {
            ctx.beginPath(); ctx.moveTo((i + viewX) % canvas.width, 0);
            ctx.lineTo((i + viewX) % canvas.width, canvas.height); ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(vX, vY, target.r, 0, Math.PI * 2);
        ctx.strokeStyle = (Math.hypot(vX - canvas.width/2, vY - canvas.height/2) < target.r) ? '#00ff00' : '#ff4655';
        ctx.lineWidth = 3; ctx.stroke();
    }
    update();
</script>
</body>
</html>
